<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H & F | Con todo mi amor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="stars-container" id="stars"></div>

    <div id="play-overlay" class="overlay">
        <div class="overlay-content">
            <p>Toca para empezar</p>
            <div class="pulse-ring"></div>
        </div>
    </div>

    <audio id="bg-music" src="Emmanuel Cortes- Amor (Official Video).mp3" loop></audio>

    <main class="container">
        <div class="heart-wrapper">
            <svg class="heart-svg" viewBox="0 0 32 29.6">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" />
            </svg>
            <div class="initials">
                <span class="letter h">H</span>
                <span class="amp">&</span>
                <span class="letter f">F</span>
            </div>
        </div>

        <div class="message">
            <h1 class="fade-in">Para mi Chinita bonita</h1>
            <p class="fade-in delays-1">H & F siempre juntos</p>
        </div>
    </main>

    <script>
        const audio = document.getElementById('bg-music');
        const overlay = document.getElementById('play-overlay');

        overlay.addEventListener('click', () => {
            audio.play();
            overlay.classList.add('hide');
            // Trigger heart beat explicitly if needed, but it's already in CSS
        });

        // Simple script to generate floating particles
        const starsContainer = document.getElementById('stars');
        const count = 50;


        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.className = 'star';

            const size = Math.random() * 4 + 2;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;

            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;

            const duration = Math.random() * 3 + 2;
            star.style.animation = `float ${duration}s infinite ease-in-out`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            star.style.opacity = Math.random();

            starsContainer.appendChild(star);
        }
    </script>
</body>

</html>
